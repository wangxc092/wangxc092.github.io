# Site settings
title:          王小川的博客
description:    "一个热情"
url:            https://github.com/inelaah/rain

# Author
author:
  name:         王小川
  email:        xiangqian684@outlook.com
  url:          https://wangxc092.github.io

# Build settings
markdown:       kramdown

# Assets
sass:
  sass_dir:     _sass
  style:        compressed

# Gems
plugins:
  - jekyll-feed
  - jekyll-paginate
  # - jemoji #Uncomment this to allow emoji in your post

# Permalinks
permalink:      /:year-:month-:day/:title
paginate:       5

# Related posts settings
related_posts_section:
  max_count:        5
  min_common_tags:  2

# Links to social media
social:
  email: xiangqian684@outlook.com
  github: https://github.com/wangxc092
